<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="Stylesheet" href="styles/header.css">
   <link rel="Stylesheet" href="styles/fotter.css">
   <link rel="Stylesheet" href="styles/student.css">
   
  <title>Document</title>
</head>
<body>
  <div class="header">
    <div>
       <img src="images/schooll.jpg">
    </div>
    <div class="stud">
        <h1>Student Dashboard</h1>
    </div>
    <div>
     <i class="fa-solid fa-bars"></i>
    </div>
  </div>
  <div class="side-prof">
  <div class="sidebar-top">
    <div class="close-icon-container">
       <i class="fa-solid fa-xmark" id="close-btn"></i>
    </div>
    
    <ul class="nav-menu">

      <li class="active"><a href="#"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
      <li><a href="#"><i class="fa-solid fa-book"></i> <span>My Courses</span></a></li>
      <li><a href="#"><i class="fa-solid fa-user-gear"></i> Profile</a></li>
    </ul>
  </div>

  <div class="profile-section">
    <div class="user-info">
      <i class="fa-solid fa-circle-user"></i>
      <span class="name" id="user">Loading...</span>
    </div>
    <a class="logout-btn" id="logout" href="/logout">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
  </div>
</div>
    <div id="overlay" class="overlay"></div>
  <div class="hero-section">
    <div class="wellcome">
      <h1>Welcome, <span id="name">i</span> </h1>
    </div>
    <div class="year">
      <div>
      <h2>Year 3 Semester 2</h2>
      </div>
    </div>
    <div>
      <h3>Cgpa-3.96</h3>
    </div>
  </div>
 <div class="examschedule">
  <div class="div-schedule">
    <h1>Exam Schedule</h1>
  </div>
  <!-- This container will be filled by JS -->
  <div id="dynamic-exam-list">
    <p style="text-align: center; color: rgb(16, 13, 13);">Checking for available exams...</p>
  </div>
</div>
   <div class="result">
     <div class="div-result">
      <h1>Result</h1>
     </div>
     <div class="courseresult">
      <div class="course-name">
        <h3>DAA</h3>
      </div>
      <div class="view">
        <button>View Result</button>
      </div>
     </div>
      <div class="courseresult">
      <div class="course-name">
        <h3>Web Programming</h3>
      </div>
      <div class="view">
        <button>View Result</button>
      </div>
     </div>
      <div class="courseresult">
      <div class="course-name">
        <h3>Data structure and Algorithm</h3>
      </div>
      <div class="view">
        <button>View Result</button>
      </div>
     </div>
  </div>
   <div class="fotter">
    <h3>
    Copyright © 2026 j University. All rights reserved.
    </h3>
  </div>
  <!-- Modal Structure -->
<div id="examModal" class="exam-modal" style="display:none;">
    <div class="modal-header">
        <h2>Exam Information</h2>
        <i class="fa-solid fa-xmark" onclick="closeModal()" style="cursor:pointer;"></i>
    </div>
    <div id="modalBody" class="modal-body">
        <!-- Details injected here -->
    </div>
    <div class="modal-footer">
        <button onclick="closeModal()" class="close-btn">Close</button>
    </div>
</div>
  <script src="js/menu.js"></script>
   <script src="js/stud.js"></script>
</body>
</html>
