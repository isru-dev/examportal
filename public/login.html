<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login</title>
  <link rel="Stylesheet" href="styles/register.css">
  <link rel="Stylesheet" href="styles/login.css">
</head>
<body>
  <header>
    <img src="images/schooll.jpg">

  </header>
  <div class="container">
  <form action="/login" method="post">
    <h1>Login</h1>
    
    <label>University ID</label><br>
    <input type="text" name="university_id" placeholder="e.g. UGR/1234/18" required><br>
    
    <label>Password</label><br>
    <input type="password" name="password" required><br>
    
    <button type="submit" class="register">Login</button>
    <p>New user? <a href="/register.html">Register</a></p>
  </form>
</div>
</body>
</html>
