<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/manageexams.css">
  <title>ManagerExams</title>
</head>
<body>
  <div class="container">
    <h2>Your Created Exams</h2>
    <table id="examTable">
        <thead>
            <tr>
                <th>Title</th>
                <th>Course</th>
                <th>Target</th>
                <th>Questions</th>
                <th>Status</th>   
                <th>Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="examList">
            <!-- Data will be injected here via JavaScript -->
        </tbody>
    </table>
</div>

<script>
    // Fetch exams when the page loads
   fetch('/teacher-exams')
    .then(res => res.json())
    .then(exams => {
        const list = document.getElementById('examList');
        list.innerHTML = exams.map(exam => {
            // Determine the CSS class based on the status
            const statusClass = `status-${exam.Status.toLowerCase().replace(' ', '-')}`;
            
            return `
                <tr>
                    <td>${exam.Title}</td>
                    <td>${exam.CourseCode}</td>
                    <td>Year ${exam.TargetYear} (Batch ${exam.TargetBatch})</td>
                    <td>${exam.TotalQuestions} Qs</td>
                    <td>
                        <span class="status-badge ${statusClass}">
                            ${exam.Status}
                        </span>
                    </td>
                    <td>${exam.TimeLimit} mins</td>
                    <td>
                        <button onclick="viewResults(${exam.ExamID})">Results</button>
                        <button onclick="deleteExam(${exam.ExamID})" style="background:#e74c3c">Delete</button>
                    </td>
                </tr>
            `;
        }).join('');
    });
</script>
</body>
</html>
