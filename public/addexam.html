<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/addexam.css">
  <title>Add exam</title>
</head>
<body>
  <div class="container">
    <form action="/create-exam-bulk" method="POST" enctype="multipart/form-data">
        <h2>Create Exam & Upload Questions</h2>
        
        <!-- Part 1: Exam Details -->
        <div class="exam-info">
            <input type="text" name="title" placeholder="Exam Title (e.g. Database Systems)" required>
            <input type="text" name="course_code" placeholder="Course Code" required>
            <input type="number" name="time_limit" placeholder="Time Limit (Minutes)" required>
            
            <select name="target_year">
                <option value="1">Year 1</option>
                <option value="2">Year 2</option>
                <option value="3">Year 3</option>
                <option value="4">Year 4</option>
            </select>
            <input type="text" name="target_batch" placeholder="Target Batch (e.g. 2026)" required>
        </div>

        <hr>

        <!-- Part 2: CSV Upload -->
        <div class="upload-section">
            <h3>Upload Questions (CSV)</h3>
            <p>Please use our official template: 
                <a href="/download-template" style="color: #6a64d4; font-weight: bold;">Download CSV Template</a>
            </p>
            <input type="file" name="questionFile" accept=".csv" required>
        </div>

        <button type="submit" class="register">Finalize and Publish Exam</button>
    </form>
</div>
</body>
</html>
